<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .search-section {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        
        .search-box button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .search-box button:active {
            transform: translateY(0);
        }
        
        .unit-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .unit-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .unit-btn.active {
            background: white;
            color: #667eea;
        }
        
        .unit-btn:hover {
            transform: scale(1.05);
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
        }
        
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .current-weather {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
        }
        
        .current-weather .location {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .current-weather .time {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .weather-icon {
            width: 120px;
            height: 120px;
            font-size: 80px;
            line-height: 120px;
            text-align: center;
        }
        
        .weather-info {
            flex: 1;
        }
        
        .temperature {
            font-size: 3.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .description {
            font-size: 1.3em;
            opacity: 0.95;
            text-transform: capitalize;
            margin-bottom: 20px;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .detail-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .detail-label {
            font-size: 0.85em;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .detail-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .forecast-section {
            grid-column: 1 / -1;
        }
        
        .forecast-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }
        
        .forecast-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .forecast-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .forecast-day {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .forecast-icon {
            font-size: 2.5em;
            margin: 10px 0;
        }
        
        .forecast-temp {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }
        
        .forecast-temp-min {
            font-size: 0.85em;
            color: #666;
        }
        
        .alerts {
            grid-column: 1 / -1;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
        }
        
        .alerts h3 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .alert-item {
            color: #856404;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .alert-item:last-child {
            border-bottom: none;
        }
        
        .favorites {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .favorite-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .favorite-btn:hover {
            background: white;
            color: #667eea;
        }
        
        .no-data {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .search-box {
                max-width: 100%;
            }
            
            .temperature {
                font-size: 2.5em;
            }
            
            .weather-main {
                flex-direction: column;
                gap: 20px;
            }
            
            .weather-icon {
                width: 100px;
                height: 100px;
                font-size: 60px;
                line-height: 100px;
            }
            
            .current-weather {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information for any location</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button onclick="searchWeather()">Search</button>
            </div>
            <div class="unit-toggle">
                <button class="unit-btn active" onclick="setUnit('metric')">°C / km/h</button>
                <button class="unit-btn" onclick="setUnit('imperial')">°F / mph</button>
            </div>
        </div>
        
        <div id="errorContainer"></div>
        <div id="weatherContainer"></div>
    </div>

    <script>
        const API_KEY = '12345678901234567890'; // Using demo key - replace with your own from openweathermap.org
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';
        
        let currentUnit = 'metric';
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];
        
        // Weather icon mapping
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '☁️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };
        
        function setUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (document.getElementById('weatherContainer').innerHTML) {
                const input = document.getElementById('searchInput').value;
                if (input) searchWeather();
            }
        }
        
        async function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            
            showLoading();
            clearError();
            
            try {
                const response = await fetch(
                    `${BASE_URL}/weather?q=${city}&units=${currentUnit}&appid=${API_KEY}`
                );
                
                if (!response.ok) {
                    throw new Error('City not found');
                }
                
                const data = await response.json();
                
                // Add to favorites if not already there
                if (!favorites.includes(city)) {
                    favorites.push(city);
                    localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
                }
                
                await displayWeather(data);
                
            } catch (error) {
                showError(error.message || 'Failed to fetch weather data');
                showDefaultView();
            }
        }
        
        async function displayWeather(currentData) {
            try {
                const { coord } = currentData;
                
                // Fetch 5-day forecast
                const forecastResponse = await fetch(
                    `${BASE_URL}/forecast?lat=${coord.lat}&lon=${coord.lon}&units=${currentUnit}&appid=${API_KEY}`
                );
                
                const forecastData = await forecastResponse.json();
                
                // Get alerts if available
                const alertsResponse = await fetch(
                    `${BASE_URL}/onecall?lat=${coord.lat}&lon=${coord.lon}&units=${currentUnit}&appid=${API_KEY}`
                );
                
                const alertsData = alertsResponse.ok ? await alertsResponse.json() : null;
                
                renderDashboard(currentData, forecastData, alertsData);
                
            } catch (error) {
                console.error('Error fetching additional data:', error);
                renderDashboard(currentData, null, null);
            }
        }
        
        function renderDashboard(current, forecast, alerts) {
            const unitSymbol = currentUnit === 'metric' ? '°C' : '°F';
            const speedUnit = currentUnit === 'metric' ? 'km/h' : 'mph';
            const icon = weatherIcons[current.weather[0].icon] || '🌤️';
            
            const now = new Date().toLocaleString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            let html = `
                <div class="dashboard">
                    <div class="card current-weather">
                        <div class="location">${current.name}, ${current.sys.country}</div>
                        <div class="time">${now}</div>
                        <div class="weather-main">
                            <div class="weather-icon">${icon}</div>
                            <div class="weather-info">
                                <div class="temperature">${Math.round(current.main.temp)}${unitSymbol}</div>
                                <div class="description">${current.weather[0].description}</div>
                            </div>
                        </div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">Feels Like</div>
                                <div class="detail-value">${Math.round(current.main.feels_like)}${unitSymbol}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${current.main.humidity}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind</div>
                                <div class="detail-value">${Math.round(current.wind.speed)} ${speedUnit}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Pressure</div>
                                <div class="detail-value">${current.main.pressure} hPa</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Visibility</div>
                                <div class="detail-value">${(current.visibility / 1000).toFixed(1)} km</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">UV Index</div>
                                <div class="detail-value">${alerts?.current?.uvi?.toFixed(1) || 'N/A'}</div>
                            </div>
                        </div>
                    </div>
            `;
            
            if (forecast) {
                const dailyForecasts = {};
                forecast.list.forEach(item => {
                    const date = new Date(item.dt * 1000).toLocaleDateString();
                    if (!dailyForecasts[date]) {
                        dailyForecasts[date] = item;
                    }
                });
                
                html += '<div class="card forecast-section"><div class="forecast-title">5-Day Forecast</div><div class="forecast-grid">';
                
                Object.entries(dailyForecasts).slice(0, 5).forEach(([date, data]) => {
                    const day = new Date(data.dt * 1000).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    const icon = weatherIcons[data.weather[0].icon] || '🌤️';
                    
                    html += `
                        <div class="forecast-item">
                            <div class="forecast-day">${day}</div>
                            <div class="forecast-icon">${icon}</div>
                            <div class="forecast-temp">${Math.round(data.main.temp)}${unitSymbol}</div>
                            <div class="forecast-temp-min">${Math.round(data.main.temp_min)}${unitSymbol}</div>
                            <div class="detail-label" style="margin-top: 8px;">${Math.round(data.main.humidity)}% humidity</div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            if (alerts?.alerts && alerts.alerts.length > 0) {
                html += '<div class="card alerts"><h3>⚠️ Weather Alerts</h3>';
                alerts.alerts.forEach(alert => {
                    html += `<div class="alert-item"><strong>${alert.event}:</strong> ${alert.description}</div>`;
                });
                html += '</div>';
            }
            
            html += `
                <div class="card">
                    <h3>Favorite Locations</h3>
                    <div class="favorites">
                        ${favorites.map(fav => `<button class="favorite-btn" onclick="quickSearch('${fav}')">${fav}</button>`).join('')}
                    </div>
                </div>
                </div>
            `;
            
            document.getElementById('weatherContainer').innerHTML = html;
        }
        
        function quickSearch(city) {
            document.getElementById('searchInput').value = city;
            searchWeather();
        }
        
        function showLoading() {
            document.getElementById('weatherContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading weather data...</p>
                </div>
            `;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorContainer');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
        }
        
        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }
        
        function showDefaultView() {
            document.getElementById('weatherContainer').innerHTML = `
                <div class="no-data">
                    Enter a city name to view weather information
                </div>
            `;
        }
        
        // Allow Enter key to search
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchWeather();
            });
            
            // Load default city if available
            if (favorites.length > 0) {
                document.getElementById('searchInput').value = favorites[0];
                searchWeather();
            } else {
                showDefaultView();
            }
        });
    </script>
</body>
</html>
